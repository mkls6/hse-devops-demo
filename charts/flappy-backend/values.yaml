---
replicaCount: 1

image:
  repository: ghcr.io/mkls6/hse-devops-demo/flappy-backend
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8000"

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: api.local
      paths:
        - path: /scoreboard
          pathType: Prefix
  tls: []

envs:
  - name: STORAGE_TYPE
    value: postgres
secret:
  enabled: true
  name: ""  # Auto-generated if empty
  data:
    DATABASE_DSN: ""  # Set via --set secret.data.DATABASE_DSN or values file

serviceMonitor:
  enabled: false
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s
  additionalLabels: {}

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
otelExporterEndpoint: ""
